version: 2.1

orbs:
  node: circleci/node@5.1.0
  docker: circleci/docker@3.0.1

jobs:
  initialize:
    executor: node/default
    steps:
      - checkout
      - run:
          name: Initialize
          command: |
            echo "🚀 Starting pipeline"
            echo "Branch: $CIRCLE_BRANCH"
            echo "Commit: $CIRCLE_SHA1"

  install-dependencies:
    docker:
      - image: cimg/node:20.10
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci

  test:
    docker:
      - image: cimg/node:20.10
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run tests
          command: npm test

  docker_build:
    machine: true
    steps:
      - checkout
      - run:
          name: Docker login
          command: echo ${DOCKER_REGISTRY_PASSWORD} | docker login -u ${DOCKER_REGISTRY_USERNAME} --password-stdin
      - run:
          name: Set Image Tag
          command: |
            SHORT_SHA=$(echo "${CIRCLE_SHA1}" | cut -c1-7)
            echo "export SHORT_SHA=${SHORT_SHA}" >> $BASH_ENV
      - run:
          name: Docker build
          command: docker build -t ${DOCKER_REGISTRY_USERNAME}/joke-jolt:${SHORT_SHA} .
      - run:
          name: Save Docker image
          command: |
            mkdir -p workspace
            docker save -o workspace/joke-jolt.tar ${DOCKER_REGISTRY_USERNAME}/joke-jolt:${SHORT_SHA}
      - persist_to_workspace:
          root: workspace
          paths:
            - joke-jolt.tar

  syft_bom:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Install Syft
          command: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
      - run:
          name: Generate SBOM
          command: |
            syft dir:. -o json > sbom.json
      - store_artifacts:
          path: sbom.json
      - persist_to_workspace:
          root: .
          paths:
            - sbom.json

  terraform_scan:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Install TerrScan
          command: \
            curl -sSfL https://raw.githubusercontent.com/aquasecurity/tfsec/master/install.sh | bash -s --  -d
      - run:
          name: TerrScan
          command: \
            tfsec ./terraform/

  trivy_fs_scan:
    docker:
      - image: aquasec/trivy:latest
    steps:
      - checkout
      - run:
          name: Trivy FS Scan
          command: |
            trivy fs . --severity CRITICAL,HIGH --exit-code 0

  trivy_image_scan:
    docker:
      - image: aquasec/trivy:latest
    steps:
      - attach_workspace:
          at: workspace
      - run:
          name: Image Scan
          command: |
            trivy image --input workspace/joke-jolt.tar \
              --severity HIGH,CRITICAL \
              --exit-code 0

  conftest_scan:
    docker:
      - image: openpolicyagent/conftest:latest
    steps:
      - checkout
      - run:
          name: Policy Check
          command: |
            conftest test k8s/ --policy policy/

  smoke_test:
    machine: true
    steps:
      - checkout
      - attach_workspace:
          at: workspace

      - run:
          name: Load Docker Image
          command: |
            docker load -i workspace/joke-jolt.tar

      - run:
          name: Set Image Tag
          command: |
            SHORT_SHA=$(echo "${CIRCLE_SHA1}" | cut -c1-7)
            echo "export SHORT_SHA=${SHORT_SHA}" >> $BASH_ENV

      - run:
          name: Run Container
          command: |
            docker run -d -p 3000:3000 \
              ${DOCKER_REGISTRY_USERNAME}/joke-jolt:${SHORT_SHA}

      - run:
          name: Wait for App
          command: sleep 10

      - run:
          name: Install Dependencies
          command: npm ci

      - run:
          name: Run Smoke Test
          command: |
            BASE_URL=http://localhost:3000 npm run smoke

  docker_push:
    machine: true
    steps:
      - attach_workspace:
          at: workspace
      - run:
          name: Load Docker image
          command: docker load -i workspace/joke-jolt.tar
      - run:
          name: Set Image Tag
          command: |
            SHORT_SHA=$(echo "${CIRCLE_SHA1}" | cut -c1-7)
            echo "export SHORT_SHA=${SHORT_SHA}" >> $BASH_ENV
      - run:
          name: Docker Login
          command: echo ${DOCKER_REGISTRY_PASSWORD} | docker login -u ${DOCKER_REGISTRY_USERNAME} --password-stdin
      - run:
          name: Push Image
          command: |
            docker push ${DOCKER_REGISTRY_USERNAME}/joke-jolt:${SHORT_SHA}

workflows:
  version: 2
  ci_pipeline:
    jobs:
      - initialize

      - install-dependencies:
          requires: [initialize]

      - test:
          requires: [install-dependencies]

      - docker_build:
          requires: [test]

      - syft_bom:
          requires: [docker_build]

      - terraform_scan:
          requires: [docker_build]

      - trivy_fs_scan:
          requires: [docker_build]

      - trivy_image_scan:
          requires: [docker_build]

      - conftest_scan:
          requires:
            - trivy_fs_scan
            - trivy_image_scan

      - smoke_test:
          requires:
            - conftest_scan

      - docker_push:
          requires:
            - smoke_test

          filters:
            branches:
              only:
                - main
