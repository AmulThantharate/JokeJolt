version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  initialize:
    executor: node/default
    steps:
      - checkout
      - run:
          name: Initialize
          command: |
            echo "🚀 Starting pipeline"
            echo "Branch: $CIRCLE_BRANCH"
            echo "Commit: $CIRCLE_SHA1"

  install-dependencies:
    docker:
      - image: circleci/node:latest
    steps:
      - checkout
      - node/install-packages:
          app-dir: .
          cache-version: "v1"
      - persist_to_workspace:
          root: .
          paths:
            - node_modules
  test:
    docker:
      - image: circleci/node:latest
    steps:
      - checkout
      - node/install-packages:
          app-dir: .
          cache-version: "v1"
      - run:
          name: Test
          command: npm test

workflows:
  version: 2
  ci_pipeline:
    jobs:
      - initialize
      - install-dependencies:
          requires:
            - initialize
      - test:
          requires:
            - install-dependencies
          filters:
            branches:
              only:
                - main
