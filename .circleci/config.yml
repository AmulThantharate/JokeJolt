version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  initialize:
    executor: node/default
    steps:
      - checkout
      - run:
          name: Initialize
          command: |
            echo "🚀 Starting pipeline"
            echo "Branch: $CIRCLE_BRANCH"
            echo "Commit: $CIRCLE_SHA1"

  install-dependencies:
    docker:
      - image: cimg/node:20.10
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci

  test:
    docker:
      - image: cimg/node:20.10
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run tests
          command: npm test

workflows:
  version: 2
  ci_pipeline:
    jobs:
      - initialize
      - install-dependencies:
          requires:
            - initialize
      - test:
          requires:
            - install-dependencies
          filters:
            branches:
              only:
                - main
