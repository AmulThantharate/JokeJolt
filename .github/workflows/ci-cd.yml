name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Stage 1: Code Quality & SAST ───────────────────────────────────────────
  code-quality:
    name: Code Quality & SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (SAST)
        run: |
          npm run lint || true
          npx eslint . --format json --output-file eslint-results.json
        continue-on-error: true

      - name: Upload ESLint results
        uses: actions/upload-artifact@v4
        with:
          name: eslint-results
          path: eslint-results.json
        if: always()

      - name: Run tests with coverage
        run: |
          npm run test:ci
          npm run smoke
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage/
            junit.xml

      - name: Check test coverage threshold
        run: |
          coverage=$(node -e "const fs=require('fs'); const coverage=JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')); console.log(coverage.total.lines.pct)")
          echo "Line coverage: ${coverage}%"
          if (( $(echo "$coverage < 80" | bc -l) )); then
            echo "❌ Coverage below 80%: ${coverage}%"
            exit 1
          fi
          echo "✅ Coverage meets threshold: ${coverage}%"

  # ─── Stage 2: Dependency Scanning ───────────────────────────────────────────
  dependency-scan:
    name: Dependency Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: Generate npm audit report
        run: npm audit --json > npm-audit-results.json || true
        continue-on-error: true

      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: npm-audit-results.json
        if: always()

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        if: always()

      - name: Check for critical vulnerabilities
        run: |
          npm audit --audit-level=critical || {
            echo "❌ Critical vulnerabilities found"
            exit 1
          }

  # ─── Stage 3: Container Image Build & Security Scan ─────────────────────────
  container-security:
    name: Container Build & Security
    runs-on: ubuntu-latest
    needs: [code-quality, dependency-scan]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            latest

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          vuln-type: "os,library"
        continue-on-error: true

      - name: Run Trivy scan with SARIF output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test"
          format: "sarif"
          output: "trivy-container-results.sarif"
        if: always()

      - name: Upload Trivy container results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-container-results.sarif"
        if: always()

      - name: Push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Stage 4: Infrastructure as Code Scanning ───────────────────────────────
  iac-scan:
    name: Infrastructure as Code Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-iac-results.sarif"
        continue-on-error: true

      - name: Upload IaC scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-iac-results.sarif"
        if: always()

      - name: Check Dockerfile security
        run: |
          echo "Checking Dockerfile best practices..."
          hadolint Dockerfile || true
        continue-on-error: true

  # ─── Stage 5: Nuclei Security Scanning ──────────────────────────────────────
  nuclei-scan:
    name: Nuclei Security Scanning
    runs-on: ubuntu-latest
    needs: [container-security]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Build and run container locally
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test .
          docker run -d --name jokejolt-test -p 3001:3000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
          sleep 10

      - name: Run Nuclei scan
        run: |
          nuclei -u http://localhost:3001 \
            -o nuclei-results.txt \
            -json-export nuclei-results.json \
            -severity critical,high,medium \
            -tags api,nodejs \
            -timeout 30 \
            -rate-limit 50 \
            -retries 2 || true
        continue-on-error: true

      - name: Stop container
        run: docker stop jokejolt-test || true
        if: always()

      - name: Upload Nuclei results
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-results
          path: |
            nuclei-results.txt
            nuclei-results.json
        if: always()

      - name: Check for critical vulnerabilities
        run: |
          if [ -f nuclei-results.json ]; then
            critical=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('nuclei-results.json','utf8')); const arr=Array.isArray(data)?data:[data]; const crit=arr.filter(i=>i.info&&i.info.severity==='critical'); console.log(crit.length)")
            if [ "$critical" -gt 0 ]; then
              echo "❌ Found $critical critical vulnerabilities"
              exit 1
            fi
          fi
          echo "✅ No critical vulnerabilities found"

  # ─── Stage 6: Deploy to Staging via ArgoCD ──────────────────────────────────
  deploy-staging:
    name: Deploy to Staging (ArgoCD)
    runs-on: ubuntu-latest
    needs: [nuclei-scan, iac-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify ArgoCD
        run: |
          echo "✅ Code pushed to develop branch"
          echo "ArgoCD will detect changes and sync to staging environment"
          echo "Monitor at: kubectl get applications -n argocd"

  # ─── Stage 7: Deploy to Production via ArgoCD ───────────────────────────────
  deploy-production:
    name: Deploy to Production (ArgoCD)
    runs-on: ubuntu-latest
    needs: [nuclei-scan, iac-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify ArgoCD
        run: |
          echo "✅ Code pushed to main branch"
          echo "ArgoCD will sync to production environment"
          echo "Monitor at: kubectl get applications -n argocd"
