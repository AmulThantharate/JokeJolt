apiVersion: v1
kind: Namespace
metadata:
  name: jokejolt

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: joke-deployment
  namespace: jokejolt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jokeapp
  template:
    metadata:
      labels:
        app: jokeapp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: joke-container
          image: claw4321/joke-jolt:v5
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "256m"
            limits:
              memory: "128Mi"
              cpu: "512m"

---
apiVersion: v1
kind: Service
metadata:
  name: joke-service
  namespace: jokejolt
spec:
  selector:
    app: jokeapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: NodePort
