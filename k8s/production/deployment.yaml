apiVersion: v1
kind: Namespace
metadata:
  name: jokejolt-production
  labels:
    environment: production
    app: jokejolt

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jokejolt
  namespace: jokejolt-production
  labels:
    app: jokejolt
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: jokejolt
  template:
    metadata:
      labels:
        app: jokejolt
        environment: production
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: jokejolt
          image: ghcr.io/route/joke-jolt:main-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: jokejolt
  namespace: jokejolt-production
  labels:
    app: jokejolt
    environment: production
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: jokejolt
    environment: production

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jokejolt
  namespace: jokejolt-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jokejolt
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
